name: Sync Online Upgrade Secret

on:
  workflow_dispatch:
    inputs:
      confirm_worker:
        description: Type the exact protected Worker name to approve the secret sync
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LINKETRY_GITHUB_UPDATE_TOKEN: ${{ secrets.LINKETRY_GITHUB_UPDATE_TOKEN }}
      LINKETRY_WORKER_NAME: ${{ vars.LINKETRY_WORKER_NAME }}
      LINKETRY_PROTECTED_ACCOUNT_IDS: ${{ vars.LINKETRY_PROTECTED_ACCOUNT_IDS }}
      LINKETRY_PROTECTED_RESOURCE_NAMES: ${{ vars.LINKETRY_PROTECTED_RESOURCE_NAMES }}
      LINKETRY_CONFIRMED_WORKER: ${{ inputs.confirm_worker }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate protected Worker target
        run: |
          node <<'NODE'
          const required = [
            'CLOUDFLARE_API_TOKEN',
            'CLOUDFLARE_ACCOUNT_ID',
            'LINKETRY_GITHUB_UPDATE_TOKEN',
            'LINKETRY_WORKER_NAME',
            'LINKETRY_PROTECTED_ACCOUNT_IDS',
            'LINKETRY_PROTECTED_RESOURCE_NAMES',
          ];
          const missing = required.filter((name) => !String(process.env[name] || '').trim());
          if (missing.length > 0) {
            throw new Error(`Missing required protected configuration: ${missing.join(', ')}`);
          }

          const split = (value) =>
            String(value || '')
              .split(',')
              .map((item) => item.trim())
              .filter(Boolean);
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID.trim().toLowerCase();
          const workerName = process.env.LINKETRY_WORKER_NAME.trim();
          const protectedAccounts = split(process.env.LINKETRY_PROTECTED_ACCOUNT_IDS).map((item) =>
            item.toLowerCase()
          );
          const protectedResources = split(process.env.LINKETRY_PROTECTED_RESOURCE_NAMES);

          if (!/^[a-f0-9]{32}$/.test(accountId)) {
            throw new Error('CLOUDFLARE_ACCOUNT_ID is invalid.');
          }
          if (!/^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$/.test(workerName)) {
            throw new Error('LINKETRY_WORKER_NAME is invalid.');
          }
          if (!protectedAccounts.includes(accountId)) {
            throw new Error('The selected account is not in LINKETRY_PROTECTED_ACCOUNT_IDS.');
          }
          if (!protectedResources.includes(workerName)) {
            throw new Error('The selected Worker is not in LINKETRY_PROTECTED_RESOURCE_NAMES.');
          }
          if (process.env.LINKETRY_CONFIRMED_WORKER.trim() !== workerName) {
            throw new Error(`Confirmation must exactly match the protected Worker name: ${workerName}`);
          }

          console.log(`Protected target verified: ${workerName} (${accountId.slice(-6)})`);
          NODE

      - name: Sync Worker online-upgrade secret
        run: |
          printf '%s' "$LINKETRY_GITHUB_UPDATE_TOKEN" |
            npx wrangler secret put LINKETRY_GITHUB_UPDATE_TOKEN --name "$LINKETRY_WORKER_NAME"
        working-directory: apps/worker

      - name: Report result
        run: |
          {
            echo "## Online upgrade secret"
            echo ""
            echo "Synced to protected Worker \`$LINKETRY_WORKER_NAME\` without deploying code or running migrations."
            echo "Production remains on its current version until an operator confirms an upgrade in Linketry Admin."
          } >> "$GITHUB_STEP_SUMMARY"
