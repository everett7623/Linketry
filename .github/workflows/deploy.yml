name: Deploy Linkora

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-linkora
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LINKORA_API_URL: ${{ vars.LINKORA_API_URL }}
      LINKORA_PAGES_PROJECT: ${{ vars.LINKORA_PAGES_PROJECT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Worker
        run: npm run type-check --workspace=apps/worker

      - name: Build Admin
        run: npm run build --workspace=apps/admin
        env:
          VITE_API_URL: ${{ env.LINKORA_API_URL }}

      - name: Deploy Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler deploy
        working-directory: apps/worker

      - name: Deploy Admin
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.LINKORA_API_URL != '' && env.LINKORA_PAGES_PROJECT != ''
        run: npx wrangler pages deploy apps/admin/dist --project-name "$LINKORA_PAGES_PROJECT" --branch main

      - name: Skip Cloudflare deploy
        if: env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == ''
        run: |
          echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
          echo "Type-check and Admin build completed successfully."

      - name: Skip Admin deploy
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && (env.LINKORA_API_URL == '' || env.LINKORA_PAGES_PROJECT == '')
        run: |
          echo "Admin deploy skipped because LINKORA_API_URL or LINKORA_PAGES_PROJECT repository variable is not configured."
          echo "Set them under GitHub repository Settings -> Secrets and variables -> Actions -> Variables."
