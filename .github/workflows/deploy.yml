name: Deploy Linkora

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-linkora
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Worker
        run: npm run type-check --workspace=apps/worker

      - name: Build Admin
        run: npm run build --workspace=apps/admin
        env:
          VITE_API_URL: https://go.y8o.de

      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Admin
        run: npx wrangler pages deploy apps/admin/dist --project-name linkora-admin --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
